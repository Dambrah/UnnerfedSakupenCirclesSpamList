<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unnerfed Sakupen Circles Spam List</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    font-family: 'Rubik', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ========================= */
/* 🔥 PREMIUM NAVBAR */
/* ========================= */
.navbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    padding: 15px max(5vw, 20px);
    background: rgba(10, 10, 10, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 15px;
}

.nav-title {
    font-size: 24px;
    font-weight: 800;
    color: white;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

/* INTEGRATED SEARCH BAR */
.nav-search {
    flex-grow: 1;
    max-width: 400px;
    position: relative;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

.nav-search.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
    position: absolute; 
}

#search-input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 20px 12px 45px;
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: white;
    border-radius: 30px; 
    outline: none;
    transition: all 0.3s ease;
}

#search-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

#search-input:focus {
    background: rgba(255, 255, 255, 0.1);
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
}

.search-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: rgba(255, 255, 255, 0.4);
    transition: color 0.3s ease;
    pointer-events: none;
}

#search-input:focus + .search-icon {
    color: white;
}

/* DISCORD BUTTON */
.discord-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #5865F2;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    border: none;
}

.discord-btn:hover {
    background: #4752C4;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
}

.discord-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* NAVIGATION TABS */
.tabs-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 25px;
}

.tabs {
    display: flex;
    gap: 10px;
    width: min(900px, 95vw);
}

.tab-btn {
    padding: 12px 24px;
    background: #0a0a0a;
    border: 2px solid rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 16px;
    transition: all 0.3s ease;
}

.tab-btn:hover {
    border-color: rgba(255, 255, 255, 0.5);
}

.tab-btn.active {
    background: white;
    color: black;
    border-color: white;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
}

/* CONTAINER */
.container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 15px;
    box-sizing: border-box;
}

/* CARD (LEVELS) */
.card {
    width: min(900px, 95vw);
    height: 220px;
    display: flex;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: #0a0a0a;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    border-color: rgba(255, 255, 255, 0.4);
}

/* LEFT PANEL (BLACK SCREEN WITH ALL TEXT INFO) */
.left {
    width: 35%;
    height: 100%;
    background: linear-gradient(135deg, #050505 0%, #111 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
    z-index: 2;
    border-right: 2px solid rgba(255, 255, 255, 0.05);
}

/* RIGHT PANEL (YOUTUBE VIDEO THUMBNAIL) */
.right {
    width: 65%;
    height: 100%;
    position: relative;
    cursor: pointer;
    background: #000;
}

.right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
}

.right:hover img {
    opacity: 0.6;
}

/* PLAY BUTTON OVERLAY */
.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background-color: rgba(255, 0, 0, 0.8);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    pointer-events: none;
}

.play-button::after {
    content: "";
    display: block;
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent white;
    margin-left: 6px;
}

.right:hover .play-button {
    background-color: #ff0000;
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
}

/* TEXTS INSIDE BLACK PANEL */
.place {
    font-size: 24px;
    font-weight: 800;
    color: white;
    margin-bottom: 4px;
}

.verifier {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    font-weight: 700;
    margin-bottom: 8px;
}

.sub {
    font-size: 12px;
    color: #888;
    line-height: 1.4;
}

.level-points {
    font-size: 15px;
    font-weight: 800;
    color: #ffcf40;
    padding: 6px 14px;
    border-radius: 8px;
    display: inline-block;
    width: max-content;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(255, 207, 64, 0.15);
    border: 1px solid rgba(255, 207, 64, 0.3);
    box-shadow: 0 0 10px rgba(255, 207, 64, 0.1);
}

/* LEADERBOARD ELEMENT STYLES */
.leaderboard-card {
    width: min(900px, 95vw);
    background: linear-gradient(135deg, #0a0a0a 0%, #111 100%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 18px;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.2s ease;
}

.leaderboard-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.3);
}

.leaderboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.player-name {
    font-size: 22px;
    font-weight: 800;
}

.player-points {
    font-size: 20px;
    font-weight: 800;
    color: #ffcf40;
    text-shadow: 0 0 10px rgba(255, 207, 64, 0.3);
}

.beaten-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-top: 5px;
}

.beaten-list {
    font-size: 14px;
    color: #ccc;
    line-height: 1.5;
}

/* UTILITY CLASSES */
.hidden-section {
    display: none !important;
}

/* 📱 MOBILE RESPONSIVENESS */
@media (max-width: 768px){
    .navbar {
        flex-direction: row;
    }
    .nav-search {
        order: 3;
        max-width: 100%;
        width: 100%;
        margin-top: 10px;
    }
    .nav-search.hidden {
        display: none; 
    }
    .card {
        height: 200px;
    }
    .nav-title {
        font-size: 20px;
    }
}

@media (max-width: 480px){
    .card {
        height: 180px;
    }
    .place { font-size: 18px; }
    .player-name { font-size: 18px; }
    .player-points { font-size: 16px; }
    .left { padding: 12px; }
    .level-points {
        font-size: 12px;
        padding: 4px 10px;
    }
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-title">USKC spam list</div>
    
    <div class="nav-search" id="nav-search">
        <input type="text" id="search-input" placeholder="Search level by name...">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </div>

    <a href="https://discord.gg/vAr7Cyv83F" target="_blank" class="discord-btn">
        <svg viewBox="0 0 127.14 96.36">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c0,0,.04-.06.05-.09h0c2.69-27.42-2.73-51.49-18.95-72.06ZM42.63,65.22C38,65.22,34.15,61,34.15,55.9S37.9,46.58,42.63,46.58c4.76,0,8.56,4.31,8.48,9.32C51.11,61,47.41,65.22,42.63,65.22Zm41.88,0c-4.73,0-8.52-4.22-8.52-9.32s3.73-9.32,8.52-9.32c4.76,0,8.56,4.31,8.48,9.32C93,61,89.28,65.22,84.51,65.22Z"/>
        </svg>
        Join Discord
    </a>
</nav>

<div class="tabs-container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-levels">Levels</button>
        <button class="tab-btn" id="btn-leaderboard">Leaderboard</button>
    </div>
</div>

<div class="container" id="levels-container"></div>
<div class="container hidden-section" id="leaderboard-container"></div>

<script>
const btnLevels = document.getElementById("btn-levels");
const btnLeaderboard = document.getElementById("btn-leaderboard");
const levelsContainer = document.getElementById("levels-container");
const leaderboardContainer = document.getElementById("leaderboard-container");
const navSearch = document.getElementById("nav-search");
const searchInput = document.getElementById("search-input");

const levelCardsElements = []; 
const leaderboardCardsElements = []; 

// 🛠️ HELPER FUNCTION: Extracts clean Video ID and converts timestamps to pure seconds
function parseYoutube(youtubeInput) {
    if (!youtubeInput) return { id: "", start: 0 };
    
    let videoId = youtubeInput.trim();
    let startSeconds = 0;

    // Safety fallback: convert malformed query syntax (like ID&t=20s) to proper syntax
    if (!videoId.includes('?') && videoId.includes('&')) {
        videoId = videoId.replace('&', '?');
    }

    try {
        const urlStr = videoId.startsWith('http') ? videoId : 'https://youtube.com/' + videoId;
        const url = new URL(urlStr);
        
        if (url.hostname.includes('youtu.be')) {
            videoId = url.pathname.slice(1);
        } else if (url.searchParams.has('v')) {
            videoId = url.searchParams.get('v');
        } else {
            videoId = url.pathname.split('/').pop();
        }

        const t = url.searchParams.get('t') || url.searchParams.get('start');
        if (t) {
            if (/^\d+s?$/.test(t)) {
                startSeconds = parseInt(t, 10);
            } else {
                const hMatch = t.match(/(\d+)h/);
                const mMatch = t.match(/(\d+)m/);
                const sMatch = t.match(/(\d+)s/);
                if (hMatch) startSeconds += parseInt(hMatch[1], 10) * 3600;
                if (mMatch) startSeconds += parseInt(mMatch[1], 10) * 60;
                if (sMatch) startSeconds += parseInt(sMatch[1], 10);
            }
        }
    } catch (e) {
        // Fallback option if URL parse breaks completely
    }

    return { id: videoId, start: startSeconds };
}

fetch("levels.json")
.then(r => r.json())
.then(data => {

    // 1. RENDER LEVELS
    data.sort((a,b) => a.place - b.place);

    data.forEach(l => {
        const exactPoints = l.points !== undefined ? l.points : 0;
        
        // Parse the video entry for clean ID and potential start timestamps
        const yt = parseYoutube(l.youtube);

        const card = document.createElement("div");
        card.className = "card";
        card.dataset.name = l.name.toLowerCase(); 

        const left = document.createElement("div");
        left.className = "left";
        
        left.innerHTML = `
            <div>
                <div class="place">#${l.place} (${l.name})</div>
                <div class="verifier">Verified by: ${l.verifier}</div>
                <div class="sub">by ${l.author}<br>id: ${l.id}</div>
            </div>
            <div class="level-points">+${exactPoints} PTS</div>
        `;

        const right = document.createElement("div");
        right.className = "right";

        // Uses clean ID to avoid broken imagery parameters
        right.innerHTML = `
            <img src="https://img.youtube.com/vi/${yt.id}/hqdefault.jpg" loading="lazy" alt="YouTube Thumbnail">
            <div class="play-button"></div>
        `;

        right.addEventListener("click", () => {
            // Build the embedded player URL dynamically
            let embedUrl = `https://www.youtube.com/embed/${yt.id}?autoplay=1`;
            if (yt.start > 0) {
                embedUrl += `&start=${yt.start}`;
            }

            right.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="${embedUrl}" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        });

        card.appendChild(left);
        card.appendChild(right);

        levelsContainer.appendChild(card);
        levelCardsElements.push(card); 
    });

    // 2. LEADERBOARD LOGIC AND RENDERING
    const leaderboardData = {};

    data.forEach(l => {
        const exactPoints = l.points !== undefined ? Number(l.points) : 0;
        
        if (l.victors && Array.isArray(l.victors)) {
            l.victors.forEach(player => {
                const trimmedPlayer = player.trim();
                if (!leaderboardData[trimmedPlayer]) {
                    leaderboardData[trimmedPlayer] = {
                        points: 0,
                        beaten: []
                    };
                }
                leaderboardData[trimmedPlayer].points += exactPoints;
                leaderboardData[trimmedPlayer].beaten.push(l.name);
            });
        }
    });

    const sortedPlayers = Object.keys(leaderboardData).map(name => ({
        name: name,
        points: leaderboardData[name].points,
        beaten: leaderboardData[name].beaten
    })).sort((a, b) => b.points - a.points);

    sortedPlayers.forEach((p, index) => {
        const lCard = document.createElement("div");
        lCard.className = "leaderboard-card";
        lCard.dataset.player = p.name.toLowerCase(); 

        lCard.innerHTML = `
            <div class="leaderboard-header">
                <div class="player-name">#${index + 1} ${p.name}</div>
                <div class="player-points">${p.points} pts</div>
            </div>
            <div class="beaten-title">Completed levels:</div>
            <div class="beaten-list">${p.beaten.join(", ")}</div>
        `;

        leaderboardContainer.appendChild(lCard);
        leaderboardCardsElements.push(lCard);
    });

    // 3. UNIVERSAL SEARCH IMPLEMENTATION
    searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        
        if (btnLevels.classList.contains("active")) {
            levelCardsElements.forEach(card => {
                if (card.dataset.name.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        } 
        else {
            leaderboardCardsElements.forEach(card => {
                if (card.dataset.player.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }
    });

});

// 4. HANDLE TAB SWITCHING (Changes Context of Search Bar)
btnLevels.addEventListener("click", () => {
    btnLevels.classList.add("active");
    btnLeaderboard.classList.remove("active");
    
    levelsContainer.classList.remove("hidden-section");
    leaderboardContainer.classList.add("hidden-section");
    
    searchInput.placeholder = "Search level by name...";
    searchInput.value = ""; 
    searchInput.dispatchEvent(new Event('input')); 
});

btnLeaderboard.addEventListener("click", () => {
    btnLeaderboard.classList.add("active");
    btnLevels.classList.remove("active");
    
    leaderboardContainer.classList.remove("hidden-section");
    levelsContainer.classList.add("hidden-section");
    
    searchInput.placeholder = "Search player by name...";
    searchInput.value = ""; 
    searchInput.dispatchEvent(new Event('input')); 
});
</script>
</body>
</html>

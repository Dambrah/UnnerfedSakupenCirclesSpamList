<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    font-family:'Rubik', sans-serif;
    color:white;
    overflow-x:hidden;
}

/* NAVIGATION TABS */
.tabs-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 20px;
    background: #000;
}

.tabs {
    display: flex;
    gap: 10px;
    width: min(900px, 95vw);
}

.tab-btn {
    padding: 12px 24px;
    background: #0a0a0a;
    border: 2px solid white;
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 16px;
    transition: all 0.2s ease;
}

.tab-btn.active {
    background: white;
    color: black;
}

/* CONTAINER */
.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:15px;
    box-sizing: border-box;
}

/* CARD (LEVELS) */
.card{
    width: min(900px, 95vw);
    height: 220px;

    display:flex;
    border-radius:18px;
    overflow:hidden;

    border:2px solid white;
    background:#0a0a0a;

    position:relative;
}

/* LEFT PANEL (BLACK SCREEN WITH ALL TEXT INFO) */
.left{
    width:35%;
    height:100%;
    background: #000000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 15px;
    box-sizing: border-box;
    z-index: 2;
}

/* RIGHT PANEL (YOUTUBE VIDEO THUMBNAIL) */
.right{
    width:65%;
    height:100%;
    position: relative;
    cursor: pointer;
    background: #000;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition: opacity 0.3s;
}

.right:hover img {
    opacity: 0.8;
}

/* PLAY BUTTON OVERLAY */
.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background-color: rgba(0, 0, 0, 0.8);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.3s ease, transform 0.2s ease;
    pointer-events: none;
    border: 2px solid white;
}

.play-button::after {
    content: "";
    display: block;
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent white;
    margin-left: 6px;
}

.right:hover .play-button {
    background-color: #ff0000;
    border-color: #ff0000;
    transform: translate(-50%, -50%) scale(1.1);
}


/* TEXTS INSIDE BLACK PANEL */
.place {
    font-size: 22px;
    font-weight: 800;
    color: white;
    margin-bottom: 4px;
}

.verifier {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: white;
    opacity: 0.8;
    font-weight: 700;
    margin-bottom: 8px;
}

.sub{
    font-size:12px;
    opacity:0.8;
    line-height:1.3;
}

/* LEADERBOARD ELEMENT STYLES */
.leaderboard-card {
    width: min(900px, 95vw);
    background: #0a0a0a;
    border: 2px solid white;
    border-radius: 18px;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.leaderboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.player-name {
    font-size: 22px;
    font-weight: 800;
}

.player-points {
    font-size: 20px;
    font-weight: 800;
    color: #ffcf40;
}

.beaten-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-top: 5px;
}

.beaten-list {
    font-size: 14px;
    opacity: 0.9;
    line-height: 1.4;
}

/* UTILITY CLASSES */
.hidden {
    display: none !important;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px){
    .card{
        height:200px;
    }
}

@media (max-width: 480px){
    .card{
        height:180px;
    }

    .place {
        font-size: 18px;
    }
    
    .player-name {
        font-size: 18px;
    }
    
    .player-points {
        font-size: 16px;
    }

    .left {
        padding: 10px;
    }
}

/* ========================= */
/* 🔥 TEXT STROKE (OUTLINE) */
/* ========================= */

.place,
.verifier,
.sub,
.player-name,
.player-points,
.beaten-title,
.beaten-list {
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
}

</style>
</head>

<body>

<div class="tabs-container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-levels">Poziomy</button>
        <button class="tab-btn" id="btn-leaderboard">Leaderboard</button>
    </div>
</div>

<div class="container" id="levels-container"></div>
<div class="container hidden" id="leaderboard-container"></div>

<script>

const btnLevels = document.getElementById("btn-levels");
const btnLeaderboard = document.getElementById("btn-leaderboard");
const levelsContainer = document.getElementById("levels-container");
const leaderboardContainer = document.getElementById("leaderboard-container");

fetch("levels.json")
.then(r => r.json())
.then(data => {

    // 1. RENDEROWANIE POZIOMÓW
    data.sort((a,b) => a.place - b.place);

    data.forEach(l => {
        const card = document.createElement("div");
        card.className = "card";

        /* LEFT PANEL (BLACK SCREEN WITH ALL TEXT INFO) */
        const left = document.createElement("div");
        left.className = "left";
        
        // Name and place are now combined into one line
        left.innerHTML = `
            <div class="place">#${l.place} (${l.name})</div>
            <div class="verifier">Verified by: ${l.verifier}</div>
            <div class="sub">by ${l.author}<br>id: ${l.id}</div>
        `;

        /* RIGHT PANEL (YOUTUBE THUMBNAIL Z PRZYCISKIEM PLAY) */
        const right = document.createElement("div");
        right.className = "right";

        right.innerHTML = `
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg" loading="lazy" alt="Miniaturka Youtube">
            <div class="play-button"></div>
        `;

        right.addEventListener("click", () => {
            right.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="https://www.youtube.com/embed/${l.youtube}?autoplay=1" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        });

        card.appendChild(left);
        card.appendChild(right);

        levelsContainer.appendChild(card);
    });

    // 2. LOGIKA I RENDEROWANIE LEADERBOARDU
    const leaderboardData = {};

    data.forEach(l => {
        const pts = Number(l.points) || 0;
        
        if (l.victors && Array.isArray(l.victors)) {
            l.victors.forEach(player => {
                const trimmedPlayer = player.trim();
                if (!leaderboardData[trimmedPlayer]) {
                    leaderboardData[trimmedPlayer] = {
                        points: 0,
                        beaten: []
                    };
                }
                leaderboardData[trimmedPlayer].points += pts;
                leaderboardData[trimmedPlayer].beaten.push(l.name);
            });
        }
    });

    const sortedPlayers = Object.keys(leaderboardData).map(name => ({
        name: name,
        points: leaderboardData[name].points,
        beaten: leaderboardData[name].beaten
    })).sort((a, b) => b.points - a.points);

    sortedPlayers.forEach((p, index) => {
        const lCard = document.createElement("div");
        lCard.className = "leaderboard-card";

        lCard.innerHTML = `
            <div class="leaderboard-header">
                <div class="player-name">#${index + 1} ${p.name}</div>
                <div class="player-points">${p.points} pkt</div>
            </div>
            <div class="beaten-title">Ukończone poziomy:</div>
            <div class="beaten-list">${p.beaten.join(", ")}</div>
        `;

        leaderboardContainer.appendChild(lCard);
    });

});

// 3. OBSŁUGA PRZEŁĄCZANIA ZAKŁADEK (TABS)
btnLevels.addEventListener("click", () => {
    btnLevels.classList.add("active");
    btnLeaderboard.classList.remove("active");
    
    levelsContainer.classList.remove("hidden");
    leaderboardContainer.classList.add("hidden");
});

btnLeaderboard.addEventListener("click", () => {
    btnLeaderboard.classList.add("active");
    btnLevels.classList.remove("active");
    
    leaderboardContainer.classList.remove("hidden");
    levelsContainer.classList.add("hidden");
});

</script>

</body>
</html>
